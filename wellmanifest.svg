<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <!-- Tło -->
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <!-- Gradowiant -->
  <defs>
    <linearGradient id="wellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="manifestGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00d9ff;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <!-- Ikona "W" (Well) -->
  <g transform="translate(150, 200)">
    <path d="M 0 80 L 30 80 L 50 40 L 70 80 L 100 80 L 100 20 L 70 20 L 50 60 L 30 20 L 0 20 Z" 
          fill="url(#wellGrad)"/>
    <circle cx="50" cy="50" r="60" fill="none" stroke="#00d9ff" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- Tekst "Well" -->
  <text x="120" y="320" font-family="Arial, sans-serif" font-size="48" font-weight="bold" 
        fill="url(#wellGrad)" text-anchor="middle">Well</text>
  
  <!-- Linia łącząca -->
  <line x1="340" y1="200" x2="380" y2="200" stroke="#00d9ff" stroke-width="3"/>
  <circle cx="360" cy="200" r="5" fill="#00d9ff"/>
  
  <!-- Ikona "Manifest" (dokument) -->
  <g transform="translate(450, 170)">
    <rect x="0" y="0" width="120" height="100" fill="none" stroke="url(#manifestGrad)" stroke-width="3" rx="5"/>
    <line x1="20" y1="30" x2="100" y2="30" stroke="url(#manifestGrad)" stroke-width="2"/>
    <line x1="20" y1="50" x2="100" y2="50" stroke="url(#manifestGrad)" stroke-width="2"/>
    <line x1="20" y1="70" x2="80" y2="70" stroke="url(#manifestGrad)" stroke-width="2"/>
    <polygon points="100,100 100,80 120,100" fill="url(#manifestGrad)"/>
  </g>
  
  <!-- Tekst "Manifest" -->
  <text x="510" y="320" font-family="Arial, sans-serif" font-size="48" font-weight="bold" 
        fill="url(#manifestGrad)" text-anchor="middle">Manifest</text>
  
  <!-- Podtytuł -->
  <text x="400" y="370" font-family="Arial, sans-serif" font-size="20" fill="#888888" text-anchor="middle">
    LLM-Powered Artifact Generation
  </text>
  
  <!-- ll + m akcent -->
  <text x="185" y="210" font-family="Arial, sans-serif" font-size="14" fill="#00d9ff" text-anchor="middle" opacity="0.6">ll</text>
  <text x="535" y="215" font-family="Arial, sans-serif" font-size="14" fill="#00ff88" text-anchor="middle" opacity="0.6">m</text>
</svg>
